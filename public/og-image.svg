<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <!-- Gold glow -->
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:0"/>
    </radialGradient>
    <!-- Gold gradient text -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
    <!-- Separator line -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#FFC107;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#FFC107;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow effects -->
  <ellipse cx="600" cy="280" rx="500" ry="320" fill="url(#glow1)" filter="url(#softBlur)"/>
  <ellipse cx="150" cy="520" rx="300" ry="200" fill="url(#glow2)" filter="url(#softBlur)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top border accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)" opacity="0.7"/>

  <!-- Badge pill -->
  <rect x="498" y="148" width="204" height="32" rx="16" fill="#FFC107" fill-opacity="0.1" stroke="#FFC107" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="519" cy="164" r="4" fill="#FFC107">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="534" y="169" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#FFC107" letter-spacing="0.5">Rezervační systém</text>

  <!-- Main logo / name -->
  <text x="600" y="270" font-family="Inter, Arial, sans-serif" font-size="110" font-weight="700" fill="url(#goldText)" text-anchor="middle" letter-spacing="-3">Valton</text>

  <!-- Divider line -->
  <rect x="270" y="298" width="660" height="1.5" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="#ffffff" fill-opacity="0.7" text-anchor="middle" letter-spacing="0.3">Inteligentní rezervační systém</text>
  <text x="600" y="396" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="#ffffff" fill-opacity="0.7" text-anchor="middle" letter-spacing="0.3">na míru vašemu salonu</text>

  <!-- Stats row -->
  <g transform="translate(600, 470)">
    <!-- Stat 1 -->
    <g transform="translate(-220, 0)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFC107" text-anchor="middle">24/7</text>
      <text x="0" y="22" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#ffffff" fill-opacity="0.45" text-anchor="middle" letter-spacing="1">DOSTUPNOST</text>
    </g>
    <!-- Divider -->
    <rect x="-70" y="-24" width="1" height="50" fill="#ffffff" fill-opacity="0.12"/>
    <!-- Stat 2 -->
    <g transform="translate(0, 0)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFC107" text-anchor="middle">3×</text>
      <text x="0" y="22" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#ffffff" fill-opacity="0.45" text-anchor="middle" letter-spacing="1">VÍCE REZERVACÍ</text>
    </g>
    <!-- Divider -->
    <rect x="70" y="-24" width="1" height="50" fill="#ffffff" fill-opacity="0.12"/>
    <!-- Stat 3 -->
    <g transform="translate(220, 0)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFC107" text-anchor="middle">48h</text>
      <text x="0" y="22" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#ffffff" fill-opacity="0.45" text-anchor="middle" letter-spacing="1">NASAZENÍ</text>
    </g>
  </g>

  <!-- URL hint -->
  <text x="600" y="590" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#ffffff" fill-opacity="0.3" text-anchor="middle" letter-spacing="0.5">valton.cz</text>

  <!-- Corner decorative elements -->
  <rect x="48" y="48" width="40" height="2" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="48" y="48" width="2" height="40" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="1112" y="48" width="40" height="2" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="1150" y="48" width="2" height="40" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="48" y="580" width="40" height="2" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="48" y="542" width="2" height="40" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="1112" y="580" width="40" height="2" fill="#FFC107" fill-opacity="0.4"/>
  <rect x="1150" y="542" width="2" height="40" fill="#FFC107" fill-opacity="0.4"/>
</svg>
